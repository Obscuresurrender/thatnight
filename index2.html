            padding: 50px 10px;
            background-color: white;
            color: black;
        }

        /* 仿範例的綠色外框容器 */
        .outer-border {
            border: 2px solid #FF69B4; 
            padding: 50px 40px;
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
            text-align: center;
        }

        h2 {
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: bold;
        }

        /* 表格樣式 */
        table {
            width: 95%;
            margin: 0 auto 40px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid red; /* 紅色表格細線 */
            padding: 12px 10px;
            vertical-align: middle;
            text-align: center;
            font-size: 16px;
        }

        th {
            font-weight: bold;
            background-color: white;
        }

        /* 底部統計文字 */
        .footer-count {
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
